<!DOCTYPE html>
<html lang="hu">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kosár – Mozifoglaló</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main_page.css">
    <script src="auth.js" defer></script>
    <script src="cart.js" defer></script>
    <style>
        .cart-wrapper {
            max-width: 680px;
            margin: 2rem auto 3rem;
            padding: 0 1.5rem;
        }
        .cart-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: 0.05em;
        }
        .cart-title span { color: var(--accent); }

        /* Kosár sorok */
        .cart-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .cart-row {
            background: radial-gradient(circle at top, #1b2238, #101628 55%);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 0.85rem 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .cart-row-name {
            flex: 1;
            font-size: 0.92rem;
            font-weight: 500;
        }
        .cart-row-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .qty-btn {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            color: #fff; font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, border-color 0.15s;
        }
        .qty-btn:hover {
            background: rgba(247,147,30,0.2);
            border-color: #f7931e;
        }
        .qty-num {
            min-width: 22px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .cart-row-price {
            font-size: 0.92rem;
            font-weight: 700;
            color: #ffcc00;
            min-width: 80px;
            text-align: right;
        }
        .cart-row-del {
            background: transparent;
            border: none;
            color: #555;
            font-size: 1rem;
            cursor: pointer;
            padding: 0.2rem 0.3rem;
            border-radius: 6px;
            transition: color 0.15s;
        }
        .cart-row-del:hover { color: #ff6b6b; }

        /* Üres kosár */
        .cart-empty {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .cart-empty-icon { font-size: 3rem; margin-bottom: 0.75rem; }
        .cart-empty-text { font-size: 0.95rem; margin-bottom: 1.25rem; }
        .cart-back-btn {
            display: inline-block;
            padding: 0.6rem 1.4rem;
            border-radius: 999px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff; font-size: 0.82rem;
            text-decoration: none;
            transition: background 0.15s;
        }
        .cart-back-btn:hover { background: rgba(255,255,255,0.12); }

        /* Összesítő */
        .cart-summary {
            background: radial-gradient(circle at top, #1b2238, #101628 55%);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 1.2rem 1.25rem;
        }
        .cart-summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .cart-summary-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.05rem;
            font-weight: 700;
            color: #fff;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 0.75rem;
            margin-top: 0.5rem;
            margin-bottom: 1.2rem;
        }
        .cart-summary-total span:last-child { color: #ffcc00; }

        /* Fizetés gomb */
        .pay-btn {
            width: 100%;
            padding: 0.85rem;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #f7931e, #ffb347);
            color: #1b1305;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 24px rgba(247,147,30,0.45);
            transition: filter 0.15s;
        }
        .pay-btn:hover { filter: brightness(1.07); }
        .pay-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Bejelentkezés figyelmeztetés */
        .login-warning {
            background: rgba(247,147,30,0.08);
            border: 1px solid rgba(247,147,30,0.25);
            border-radius: 10px;
            padding: 0.85rem 1rem;
            font-size: 0.83rem;
            color: #ffb347;
            margin-bottom: 1rem;
            display: none;
        }
        .login-warning a {
            color: #f7931e;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
        }

        /* Sikeres fizetés */
        .success-box {
            text-align: center;
            padding: 2.5rem 1rem;
            display: none;
        }
        .success-icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .success-title {
            font-size: 1.3rem; font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .success-sub {
            color: var(--text-muted); font-size: 0.88rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="navbar-inner">
        <div class="logo">
            <div class="logo-mark"></div>
            <span>MOZIFoglaló</span>
        </div>
        <nav class="nav-links">
            <a href="main_page.html" class="nav-link">MŰSORON</a>
            <a href="ajanlatok.html" class="nav-link">AJÁNLATOK</a>
            <a href="étel_ital.html" class="nav-link">ÉTEL & ITAL</a>
        </nav>
        <div class="nav-actions">
            <button class="nav-btn secondary">Bejelentkezés</button>
            <button class="nav-btn primary">Regisztráció</button>
        </div>
    </div>
</header>

<main>
    <div class="cart-wrapper">
        <h1 class="cart-title">🛒 A <span>kosarad</span></h1>

        <!-- Sikeres rendelés -->
        <div class="success-box" id="successBox">
            <div class="success-icon">🎉</div>
            <div class="success-title">Rendelés leadva!</div>
            <div class="success-sub">Köszönjük, rendelésedet rögzítettük.<br>A pénztárnál átveheted a rendelésedet.</div>
            <a href="étel_ital.html" class="cart-back-btn">Vissza az ételekhez</a>
        </div>

        <!-- Kosár tartalma -->
        <div id="cartContent">
            <div class="cart-empty" id="cartEmpty" style="display:none">
                <div class="cart-empty-icon">🛒</div>
                <div class="cart-empty-text">A kosarad üres.</div>
                <a href="étel_ital.html" class="cart-back-btn">Vissza az ételekhez</a>
            </div>

            <div class="cart-list" id="cartList"></div>

            <div class="cart-summary" id="cartSummary" style="display:none">
                <div class="cart-summary-row">
                    <span id="summaryCount">0 tétel</span>
                    <span id="summarySubtotal"></span>
                </div>
                <div class="cart-summary-total">
                    <span>Összesen</span>
                    <span id="summaryTotal"></span>
                </div>

                <div class="login-warning" id="loginWarning">
                    A fizetéshez <a id="loginLink">be kell jelentkezned</a>.
                </div>

                <button class="pay-btn" id="payBtn">💳 Helyben fizetek</button>
            </div>
        </div>
    </div>
</main>

<footer class="footer">
    © 2025 Mozifoglaló – Kosár
</footer>

<script>
const API = "http://localhost:3000";

function formatFt(n) {
    return n.toLocaleString("hu-HU") + " Ft";
}

function renderCart() {
    const cart = getCart();
    const list = document.getElementById("cartList");
    const empty = document.getElementById("cartEmpty");
    const summary = document.getElementById("cartSummary");

    list.innerHTML = "";

    if (cart.length === 0) {
        empty.style.display = "block";
        summary.style.display = "none";
        return;
    }

    empty.style.display = "none";
    summary.style.display = "block";

    cart.forEach(item => {
        const row = document.createElement("div");
        row.className = "cart-row";
        row.innerHTML = `
            <div class="cart-row-name">${item.nev}</div>
            <div class="cart-row-controls">
                <button class="qty-btn" data-action="minus" data-id="${item.id}">−</button>
                <span class="qty-num">${item.mennyiseg}</span>
                <button class="qty-btn" data-action="plus" data-id="${item.id}" data-nev="${item.nev}" data-ar="${item.ar}">+</button>
            </div>
            <div class="cart-row-price">${formatFt(item.ar * item.mennyiseg)}</div>
            <button class="cart-row-del" data-action="del" data-id="${item.id}" title="Törlés">✕</button>
        `;
        list.appendChild(row);
    });

    // Gombok bekötése
    list.querySelectorAll("[data-action]").forEach(btn => {
        btn.addEventListener("click", () => {
            const id  = parseInt(btn.dataset.id);
            const action = btn.dataset.action;
            if (action === "plus") {
                addToCart(id, btn.dataset.nev, parseInt(btn.dataset.ar));
            } else if (action === "minus") {
                removeFromCart(id);
            } else if (action === "del") {
                const cart = getCart();
                const idx = cart.findIndex(i => i.id === id);
                if (idx !== -1) { cart.splice(idx, 1); saveCart(cart); }
            }
            renderCart();
            updateCartBadge();
        });
    });

    // Összesítő
    const count = cart.reduce((s, i) => s + i.mennyiseg, 0);
    const total = cartTotal();
    document.getElementById("summaryCount").textContent = `${count} tétel`;
    document.getElementById("summarySubtotal").textContent = formatFt(total);
    document.getElementById("summaryTotal").textContent = formatFt(total);

    // Bejelentkezés figyelmeztetés
    const user = getUser();
    const warning = document.getElementById("loginWarning");
    const payBtn  = document.getElementById("payBtn");
    if (!user) {
        warning.style.display = "block";
        payBtn.disabled = true;
        document.getElementById("loginLink").addEventListener("click", () => {
            // auth.js openDropdown-ját hívjuk
            const loginBtn = document.getElementById("navLoginBtn") ||
                             document.querySelector(".nav-btn.secondary");
            if (loginBtn) loginBtn.click();
        });
    } else {
        warning.style.display = "none";
        payBtn.disabled = false;
    }
}

// ── Fizetés ───────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
    renderCart();

    document.getElementById("payBtn").addEventListener("click", async () => {
        const user = getUser();
        if (!user) return;

        const cart = getCart();
        if (cart.length === 0) return;

        const btn = document.getElementById("payBtn");
        btn.disabled = true;
        btn.textContent = "Feldolgozás…";

        try {
            const res = await fetch(`${API}/rendeles`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + getToken(),
                },
                body: JSON.stringify({ tetelek: cart }),
            });

            if (res.ok) {
                clearCart();
                document.getElementById("cartContent").style.display = "none";
                document.getElementById("successBox").style.display = "block";
                updateCartBadge();
            } else {
                const data = await res.json();
                alert(data.error || "Hiba történt a rendelés során.");
                btn.disabled = false;
                btn.textContent = "💳 Helyben fizetek";
            }
        } catch {
            alert("Nem sikerült elérni a szervert.");
            btn.disabled = false;
            btn.textContent = "💳 Helyben fizetek";
        }
    });
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
